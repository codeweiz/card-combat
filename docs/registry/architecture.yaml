# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: mvp_rules_core_object_model
    status: active
    api: "GDScript RefCounted services for simulation; Resource classes for card definitions"
    not: "Scene-tree Nodes or Autoload singletons as authoritative match state"
    adr: docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
    reason: "Scene-independent rules are easier to replay, hash, test, and wrap with future server authority."
    referenced_by:
      - docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
      - docs/architecture/adr-0002-mvp-card-effect-resolution-architecture.md
      - docs/architecture/adr-0003-mvp-lane-board-and-response-window-state.md
    added: 2026-06-17
    revised: ""

  - purpose: mvp_card_effect_model
    status: active
    api: "CardEffectResolver RefCounted service with typed EffectParams Resource subclasses"
    not: "Executable card scripts, scene-tree effect nodes, or raw dictionary params as production effect behavior"
    adr: docs/architecture/adr-0002-mvp-card-effect-resolution-architecture.md
    reason: "Typed effect schemas make card behavior deterministic, testable, and validateable before match start."
    referenced_by:
      - docs/architecture/adr-0002-mvp-card-effect-resolution-architecture.md
      - design/gdd/card-effect-resolution-system.md
      - design/gdd/card-data-model.md
    added: 2026-06-17
    revised: ""

  - purpose: mvp_board_and_stack_state_model
    status: active
    api: "RefCounted BoardState, LaneState, UnitInstance, ResponseWindowState, and StackItem objects stored under MatchState with canonical data serialization"
    not: "Scene-tree lane nodes, UI-owned board state, or event-only board reconstruction for local MVP validation"
    adr: docs/architecture/adr-0003-mvp-lane-board-and-response-window-state.md
    reason: "Small typed state objects preserve invariants while staying hashable, headless-testable, and compatible with future replay."
    referenced_by:
      - docs/architecture/adr-0003-mvp-lane-board-and-response-window-state.md
      - design/gdd/zone-lane-board-system.md
      - design/gdd/stack-response-system.md
    added: 2026-06-17
    revised: ""


# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: scene_tree_coupled_simulation
    status: active
    description: "Core match state must not be owned by Node scenes or mutated directly by UI nodes."
    why: "Scene ownership makes deterministic replay, headless tests, and future server authority fragile."
    adr: docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
    added: 2026-06-17

  - pattern: autoload_singleton_match_state
    status: active
    description: "The authoritative match state must not live in a globally accessed Autoload singleton."
    why: "Hidden global access makes state ownership and isolated tests unreliable."
    adr: docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
    added: 2026-06-17

  - pattern: wall_clock_or_frame_delta_in_core_simulation
    status: active
    description: "Core match resolution must not depend on wall-clock time, frame delta, or _process callbacks."
    why: "Replay must depend only on match setup and ordered commands."
    adr: docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
    added: 2026-06-17

  - pattern: prototype_imports_in_production_source
    status: active
    description: "Production source must not import or refactor code/data directly from prototypes/."
    why: "Prototype shortcuts are intentionally relaxed and not production-safe."
    adr: docs/architecture/adr-0001-mvp-deterministic-card-simulation.md
    added: 2026-06-17

  - pattern: executable_card_effect_scripts
    status: active
    description: "Card definitions must not embed executable script text, script paths, or callable behavior as production card effects."
    why: "Executable card behavior is difficult to validate, replay, and wrap with future server authority."
    adr: docs/architecture/adr-0002-mvp-card-effect-resolution-architecture.md
    added: 2026-06-17

  - pattern: raw_untyped_effect_params
    status: active
    description: "Production card effects must not use raw untyped dictionaries as their runtime parameter schema."
    why: "Typed EffectParams resources prevent typo-driven behavior and support deterministic validation."
    adr: docs/architecture/adr-0002-mvp-card-effect-resolution-architecture.md
    added: 2026-06-17

  - pattern: ui_direct_board_or_stack_mutation
    status: active
    description: "UI, animation, and network adapters must not directly write BoardState, LaneState, UnitInstance, ResponseWindowState, or StackItem fields."
    why: "Direct writes bypass command validation, response ordering, canonical hashes, and future replay diagnostics."
    adr: docs/architecture/adr-0003-mvp-lane-board-and-response-window-state.md
    added: 2026-06-17

  - pattern: unserialized_transient_stack_state
    status: active
    description: "Pending original actions, response items, cancel/fizzle flags, and outcome reasons must not exist only as non-canonical transient UI or local variables."
    why: "Replay and desync diagnostics need deterministic access to stack outcome state."
    adr: docs/architecture/adr-0003-mvp-lane-board-and-response-window-state.md
    added: 2026-06-17

